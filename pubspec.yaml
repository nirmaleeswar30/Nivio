name: nivio
description: "Netflix-style streaming app"
publish_to: 'none'
version: 1.1.0

platforms:
  android:

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0
  aimi_lib: ^3.0.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  google_sign_in: ^6.2.2

  # Video Player
  youtube_player_flutter: ^9.0.3
  flutter_inappwebview: ^6.1.5

  # UI & Images
  cached_network_image: ^3.4.1
  phosphor_flutter: ^2.1.0

  # Navigation
  go_router: ^14.6.2

  # Utilities
  intl: ^0.20.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  url_launcher: ^6.3.1
  package_info_plus: ^9.0.0
  flutter_native_splash: ^2.4.2

  # Background Tasks & Notifications
  workmanager: ^0.9.0
  flutter_local_notifications: ^18.0.1
  connectivity_plus: ^6.1.1
  palette_generator: ^0.3.3+7
  better_player_plus:
    path: packages/better_player_plus
  shorebird_code_push: ^2.0.5
  supabase_flutter: ^2.8.0
  flutter_dotenv: ^6.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1

  # Splash Screen & App Icon
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - shorebird.yaml
    - assets/fonts/satoshi/
    - .env

  fonts:
    - family: Satoshi
      fonts:
        - asset: assets/fonts/satoshi/Satoshi-Light.otf
          weight: 300
        - asset: assets/fonts/satoshi/Satoshi-LightItalic.otf
          weight: 300
          style: italic
        - asset: assets/fonts/satoshi/Satoshi-Regular.otf
          weight: 400
        - asset: assets/fonts/satoshi/Satoshi-Medium.otf
          weight: 500
        - asset: assets/fonts/satoshi/Satoshi-MediumItalic.otf
          weight: 500
          style: italic
        - asset: assets/fonts/satoshi/Satoshi-Bold.otf
          weight: 700
        - asset: assets/fonts/satoshi/Satoshi-BoldItalic.otf
          weight: 700
          style: italic
        - asset: assets/fonts/satoshi/Satoshi-Black.otf
          weight: 900
        - asset: assets/fonts/satoshi/Satoshi-Italic.otf
          style: italic
        - asset: assets/fonts/satoshi/Satoshi-BlackItalic.otf
          weight: 900
          style: italic

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/nivio-dark.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/nivio-dark.png"
  min_sdk_android: 21

# Splash Screen Configuration  
flutter_native_splash:
  color: "#000000"
  image: assets/images/nivio-dark.png
  android: true
  ios: false
  web: false
  android_12:
    image: assets/images/nivio-dark.png
    color: "#000000"
